# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    properties:
      configPath:
        type: string
        default: config.yaml
        description: Path to the configuration YAML file
      opmlPath:
        type: string
        default: feeds.opml
        description: Path to the OPML file with feed definitions
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'rssmcp',
      args: ['--config', config.configPath, '--opml', config.opmlPath]
    })
  exampleConfig:
    configPath: config.yaml
    opmlPath: feeds.opml
